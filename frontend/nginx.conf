server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ───── Headers de sécurité ────────────────────────────────────────
    # Empêche le MIME-sniffing (un .jpg avec payload HTML ne sera pas
    # interprété comme HTML par Chrome).
    add_header X-Content-Type-Options "nosniff" always;

    # Empêche l'embedding dans un <iframe> externe → clickjacking.
    add_header X-Frame-Options "DENY" always;

    # Limite les infos envoyées dans le Referer (URLs privées des docs
    # permis ne fuitent pas sur les liens sortants).
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Désactive quelques APIs puissantes non utilisées par l'app.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP : whitelist des sources autorisées. En dev on autorise
    # localhost:8080 pour l'API + les tiles OSM France pour la carte
    # concours + les polices Google. 'unsafe-inline' pour les style
    # attributes et styled-components utilisés çà et là.
    # Stripe : js.stripe.com (script), api.stripe.com (API), hooks.stripe.com
    # (3DS iframe), m.stripe.network (fingerprinting Radar — sans lequel le
    # PaymentElement refuse de se monter), q.stripe.com / r.stripe.com
    # (métriques et images).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: http://localhost:8080 https://*.tile.openstreetmap.fr https://*.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://js.stripe.com; connect-src 'self' http://localhost:8080 https://api.open-meteo.com https://*.tile.openstreetmap.fr https://api.stripe.com https://m.stripe.network https://q.stripe.com https://r.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com https://m.stripe.network; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ───── Routing SPA ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache sur les assets hashés par Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
