server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache on hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
