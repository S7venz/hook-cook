---
grails:
    profile: rest-api
    codegen:
        defaultPackage: backend
    gorm:
        reactor:
            # Whether to translate GORM events into Reactor events
            # Disabled by default for performance reasons
            events: false
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    jmx:
        unique-names: true
    main:
        banner-mode: "off"
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback.groovy'
                - '*.properties'
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 12MB
    mail:
        # SMTP désactivé par défaut — dès que ces variables sont définies
        # (via variables d'env SMTP_HOST, SMTP_USERNAME, SMTP_PASSWORD, SMTP_PORT),
        # MailService bascule automatiquement sur un vrai envoi.
        host: ${SMTP_HOST:}
        port: ${SMTP_PORT:587}
        username: ${SMTP_USERNAME:}
        password: ${SMTP_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
hc:
    frontend:
        # URL publique du frontend, utilisée dans les liens des emails.
        # En dev local : http://localhost:5173. En prod : https://hookcook.fr
        url: ${HC_FRONTEND_URL:http://localhost:5173}
    mail:
        from: ${SMTP_FROM:no-reply@hookcook.fr}
    stripe:
        # Mode test/dev par défaut. Définir STRIPE_SECRET_KEY (sk_test_...
        # ou sk_live_...) pour activer Stripe ; sinon le service bascule
        # en mode "mock" (commande directement marquée payée, utile en CI).
        secret-key: ${STRIPE_SECRET_KEY:}
        publishable-key: ${STRIPE_PUBLIC_KEY:}
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
        currency: ${STRIPE_CURRENCY:eur}
environments:
    development:
        management:
            # Même en dev, on n'expose que health et info — /env et
            # /heapdump dumperaient les secrets sur un Wi-Fi partagé.
            endpoints:
                enabled-by-default: false
                web:
                    base-path: '/actuator'
                    exposure:
                        include: 'health,info'
            endpoint:
                health:
                    enabled: true
                info:
                    enabled: true
    production:
        management:
            # En prod : on n'expose QUE health (Docker healthcheck) — pas
            # d'/env, pas d'/heapdump qui dumperait les secrets.
            endpoints:
                enabled-by-default: false
                web:
                    base-path: '/actuator'
                    exposure:
                        include: 'health'
            endpoint:
                health:
                    enabled: true
                    show-details: never

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            json:
              - application/json
              - text/json   
            hal:
              - application/hal+json
              - application/hal+xml  
            xml:
              - text/xml
              - application/xml                                 
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            js: text/javascript
            rss: application/rss+xml
            text: text/plain
            all: '*/*'            
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
        upload:
            maxFileSize: 10485760       # 10 MB
            maxRequestSize: 10485760    # 10 MB
    converters:
        encoding: UTF-8

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    jmxExport: true
    dialect: org.hibernate.dialect.PostgreSQLDialect
    driverClassName: org.postgresql.Driver

environments:
    development:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://localhost:5432/hookcook
            username: hookcook
            password: hookcook
    test:
        dataSource:
            dbCreate: create-drop
            driverClassName: org.h2.Driver
            dialect: org.hibernate.dialect.H2Dialect
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            username: sa
            password: ''
    production:
        dataSource:
            # "update" = Hibernate crée les tables manquantes et ajoute les nouvelles
            # colonnes au boot. Suffisant pour ce projet ; pour une vraie prod,
            # utiliser un outil de migration (Flyway/Liquibase) et passer à "validate".
            dbCreate: update
            url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/hookcook}
            username: ${DATASOURCE_USERNAME:hookcook}
            password: ${DATASOURCE_PASSWORD:hookcook}
            properties:
                jmxEnabled: true
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
                maxWait: 10000
                maxAge: 600000
                timeBetweenEvictionRunsMillis: 5000
                minEvictableIdleTimeMillis: 60000
                validationQuery: SELECT 1
                validationQueryTimeout: 3
                validationInterval: 15000
                testOnBorrow: true
                testWhileIdle: true
                testOnReturn: false
                jdbcInterceptors: ConnectionState
                defaultTransactionIsolation: 2
