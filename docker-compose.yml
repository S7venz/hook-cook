services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hookcook
      POSTGRES_USER: hookcook
      POSTGRES_PASSWORD: hookcook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookcook -d hookcook"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/hookcook
      DATASOURCE_USERNAME: hookcook
      DATASOURCE_PASSWORD: hookcook
      # Override for production — change this secret!
      HC_JWT_SECRET: ${HC_JWT_SECRET:-hook-cook-dev-secret-change-me-please-change-me-please-change-me}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
